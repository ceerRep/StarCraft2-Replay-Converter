<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际争霸II 录像版本修改工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f7f9fc;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1e8449;
            border-bottom: 2px solid #1e8449;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        input[type="file"] { display: none; }
        .custom-file-upload {
            border: 3px dashed #1e8449;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            min-height: 100px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            color: #1e8449;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .custom-file-upload:hover, .drag-over {
            background-color: #e8f8f5;
            border-color: #145b32;
        }
        #fileNameDisplay {
            margin-top: 10px;
            font-weight: normal;
            font-size: 0.9em;
            color: #7f8c8d;
        }
        .version-panel {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .version-panel h3 {
            margin: 0 0 15px 0;
            color: #495057;
            font-size: 1em;
        }
        .version-inputs {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .version-inputs label {
            display: flex;
            flex-direction: column;
            font-size: 0.8em;
            color: #6c757d;
        }
        .version-inputs input {
            margin-top: 4px;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1em;
            text-align: center;
        }
        .version-inputs input:focus {
            border-color: #1e8449;
            outline: none;
            box-shadow: 0 0 0 2px rgba(30, 132, 73, 0.2);
        }
        .mode-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
        }
        .mode-tab {
            flex: 1;
            padding: 8px 16px;
            border: 1px solid #dee2e6;
            background: #e9ecef;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .mode-tab:first-child { border-radius: 6px 0 0 6px; }
        .mode-tab:last-child { border-radius: 0 6px 6px 0; }
        .mode-tab.active {
            background: #1e8449;
            color: white;
            border-color: #1e8449;
        }
        .ref-file-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ref-file-area button {
            padding: 8px 16px;
            border: 1px solid #1e8449;
            background: white;
            color: #1e8449;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            white-space: nowrap;
        }
        .ref-file-area button:hover { background: #e8f8f5; }
        .ref-file-area span {
            font-size: 0.85em;
            color: #6c757d;
        }
        #processBtn {
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 80%;
        }
        #processBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        #processBtn:hover:not(:disabled) { background-color: #2980b9; }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            min-height: 20px;
            font-weight: 500;
            text-align: left;
        }
        .note {
            margin-top: 15px;
            font-size: 0.85em;
            color: #7f8c8d;
        }
        .file-version-list {
            margin-top: 10px;
            text-align: left;
            font-size: 0.85em;
            max-height: 150px;
            overflow-y: auto;
        }
        .file-version-list div {
            padding: 4px 8px;
            border-bottom: 1px solid #eee;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>星际争霸II 录像版本修改工具</h1>
    <p style="margin-bottom:20px;color:#555;">通用版本号修改，可用于跨服录像兼容、版本降级/升级等场景。支持批量处理。</p>

    <div class="version-panel">
        <h3>目标版本设置</h3>
        <div class="mode-tabs">
            <div class="mode-tab active" data-mode="manual">手动输入</div>
            <div class="mode-tab" data-mode="ref">从参考录像读取</div>
        </div>
        <div id="manualMode">
            <div class="version-inputs">
                <label>Major<input type="number" id="vMajor" value="5" min="0"></label>
                <label>Minor<input type="number" id="vMinor" value="0" min="0"></label>
                <label>Revision<input type="number" id="vRevision" value="15" min="0"></label>
                <label>Build<input type="number" id="vBuild" value="96999" min="0"></label>
                <label>BaseBuild<input type="number" id="vBaseBuild" value="96999" min="0"></label>
            </div>
        </div>
        <div id="refMode" style="display:none;">
            <div class="ref-file-area">
                <button id="refFileBtn">选择参考录像文件</button>
                <input type="file" id="refFileInput" accept=".SC2Replay" />
                <span id="refFileStatus">未选择参考文件</span>
            </div>
        </div>
    </div>

    <label for="replayFile" class="custom-file-upload" id="dropArea">
        点击选择或拖拽待修改的 .SC2Replay 文件到此
        <span id="fileNameDisplay">（未选择文件）</span>
    </label>
    <input type="file" id="replayFile" accept=".SC2Replay" multiple />

    <div id="fileVersionList" class="file-version-list"></div>

    <button id="processBtn" disabled>执行版本修改并下载</button>

    <div id="status"></div>
    <p class="note">本工具在浏览器本地执行，文件不会上传至任何服务器。修改后的文件名带有 -PATCHED 后缀。</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const fileInput = document.getElementById('replayFile');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const dropArea = document.getElementById('dropArea');
    const fileVersionList = document.getElementById('fileVersionList');
    const refFileInput = document.getElementById('refFileInput');
    const refFileBtn = document.getElementById('refFileBtn');
    const refFileStatus = document.getElementById('refFileStatus');
    let fileQueue = [];
    let processing = false;

    // --- s2protocol VInt codec ---

    function decodeVInt(view, offset) {
        let b = view[offset++];
        const negative = b & 1;
        let result = (b >> 1) & 0x3f;
        let bits = 6;
        while (b & 0x80) {
            b = view[offset++];
            result |= (b & 0x7f) << bits;
            bits += 7;
        }
        return { value: negative ? -result : result, offset };
    }

    function encodeVInt(value) {
        const negative = value < 0;
        let magnitude = negative ? -value : value;
        const bytes = [];
        let first = ((magnitude & 0x3f) << 1) | (negative ? 1 : 0);
        magnitude >>= 6;
        if (magnitude > 0) first |= 0x80;
        bytes.push(first);
        while (magnitude > 0) {
            let b = magnitude & 0x7f;
            magnitude >>= 7;
            if (magnitude > 0) b |= 0x80;
            bytes.push(b);
        }
        return new Uint8Array(bytes);
    }

    // --- Replay header parser ---

    function parseReplayHeader(buffer) {
        const view = new Uint8Array(buffer);
        if (view[0] !== 0x4D || view[1] !== 0x50 || view[2] !== 0x51 || view[3] !== 0x1B) {
            throw new Error('Not an MPQ file');
        }

        // Serialized header starts at offset 0x10
        let off = 0x10;
        // Skip outer struct: skip byte (0x05) + field count VInt
        off++; // skip byte = 0x05
        let r = decodeVInt(view, off); off = r.offset; // field count

        // Field 0: m_signature (blob)
        r = decodeVInt(view, off); off = r.offset; // field tag 0
        off++; // skip byte = 0x02 (blob)
        r = decodeVInt(view, off); off = r.offset; // blob length
        off += r.value; // skip blob data

        // Field 1: m_version (struct) - this is what we want
        r = decodeVInt(view, off); off = r.offset; // field tag 1
        off++; // skip byte = 0x05 (struct)
        const versionStructStart = off;
        r = decodeVInt(view, off); off = r.offset; // version field count
        const versionFieldCount = r.value;

        const version = {};
        const fieldOffsets = {};
        const fieldNames = ['m_flags', 'm_major', 'm_minor', 'm_revision', 'm_build', 'm_baseBuild'];

        for (let i = 0; i < versionFieldCount; i++) {
            r = decodeVInt(view, off); off = r.offset; // field tag
            const tag = r.value;
            off++; // skip byte (0x09 = vint)
            const valueStart = off;
            r = decodeVInt(view, off); off = r.offset;
            const valueEnd = off;
            const name = tag < fieldNames.length ? fieldNames[tag] : `field_${tag}`;
            version[name] = r.value;
            fieldOffsets[name] = { start: valueStart, end: valueEnd };
        }
        const versionStructEnd = off;

        // Continue parsing outer struct to find m_dataBuildNum (field tag 6)
        // Field 2: m_type
        r = decodeVInt(view, off); off = r.offset; // tag
        off++; // skip
        r = decodeVInt(view, off); off = r.offset; // value

        // Field 3: m_elapsedGameLoops
        r = decodeVInt(view, off); off = r.offset; // tag
        off++; // skip
        r = decodeVInt(view, off); off = r.offset; // value

        // Field 4: m_useScaledTime (uint8)
        r = decodeVInt(view, off); off = r.offset; // tag
        off++; // skip byte (0x06 = uint8)
        off++; // uint8 value

        // Field 5: m_ngdpRootKey (struct)
        r = decodeVInt(view, off); off = r.offset; // tag
        off++; // skip byte (0x05 = struct)
        r = decodeVInt(view, off); off = r.offset; // sub-struct field count
        const subFieldCount = r.value;
        for (let i = 0; i < subFieldCount; i++) {
            r = decodeVInt(view, off); off = r.offset; // sub-field tag
            const subSkip = view[off]; off++;
            if (subSkip === 0x02) { // blob
                r = decodeVInt(view, off); off = r.offset;
                off += r.value;
            } else if (subSkip === 0x09) { // vint
                r = decodeVInt(view, off); off = r.offset;
            }
        }

        // Field 6: m_dataBuildNum
        r = decodeVInt(view, off); off = r.offset; // tag (should be 6)
        off++; // skip byte (0x09)
        const dataBuildStart = off;
        r = decodeVInt(view, off); off = r.offset;
        const dataBuildEnd = off;
        const dataBuildNum = r.value;

        return {
            version,
            fieldOffsets,
            versionStructStart,
            versionStructEnd,
            dataBuild: { value: dataBuildNum, start: dataBuildStart, end: dataBuildEnd }
        };
    }

    function patchReplayVersion(buffer, targetVersion) {
        const parsed = parseReplayHeader(buffer);
        const view = new Uint8Array(buffer);

        // Build list of patches: [{start, end, newBytes}]
        // We patch from end to start so offsets don't shift
        const patches = [];

        // Patch m_dataBuildNum (use target build)
        patches.push({
            start: parsed.dataBuild.start,
            end: parsed.dataBuild.end,
            newBytes: encodeVInt(targetVersion.build)
        });

        // Patch version struct fields
        const fieldsToPath = [
            { name: 'm_baseBuild', value: targetVersion.baseBuild },
            { name: 'm_build', value: targetVersion.build },
            { name: 'm_revision', value: targetVersion.revision },
            { name: 'm_minor', value: targetVersion.minor },
            { name: 'm_major', value: targetVersion.major },
        ];

        for (const f of fieldsToPath) {
            const fo = parsed.fieldOffsets[f.name];
            if (fo) {
                patches.push({ start: fo.start, end: fo.end, newBytes: encodeVInt(f.value) });
            }
        }

        // Sort patches by start offset descending (patch from end to start)
        patches.sort((a, b) => b.start - a.start);

        let result = new Uint8Array(buffer.slice(0));
        for (const p of patches) {
            const oldLen = p.end - p.start;
            const newLen = p.newBytes.length;
            if (oldLen === newLen) {
                result.set(p.newBytes, p.start);
            } else {
                // Rebuild buffer with different length
                const newBuf = new Uint8Array(result.length + (newLen - oldLen));
                newBuf.set(result.subarray(0, p.start));
                newBuf.set(p.newBytes, p.start);
                newBuf.set(result.subarray(p.end), p.start + newLen);
                result = newBuf;
            }
        }

        return result.buffer;
    }

    function getTargetVersion() {
        return {
            major: parseInt(document.getElementById('vMajor').value) || 0,
            minor: parseInt(document.getElementById('vMinor').value) || 0,
            revision: parseInt(document.getElementById('vRevision').value) || 0,
            build: parseInt(document.getElementById('vBuild').value) || 0,
            baseBuild: parseInt(document.getElementById('vBaseBuild').value) || 0,
        };
    }

    function versionString(v) {
        return `${v.m_major}.${v.m_minor}.${v.m_revision}.${v.m_build}`;
    }

    // --- Mode tabs ---
    document.querySelectorAll('.mode-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('manualMode').style.display = tab.dataset.mode === 'manual' ? '' : 'none';
            document.getElementById('refMode').style.display = tab.dataset.mode === 'ref' ? '' : 'none';
        });
    });

    // --- Reference file ---
    refFileBtn.addEventListener('click', () => refFileInput.click());
    refFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const parsed = parseReplayHeader(ev.target.result);
                const v = parsed.version;
                document.getElementById('vMajor').value = v.m_major;
                document.getElementById('vMinor').value = v.m_minor;
                document.getElementById('vRevision').value = v.m_revision;
                document.getElementById('vBuild').value = v.m_build;
                document.getElementById('vBaseBuild').value = v.m_baseBuild;
                refFileStatus.textContent = `${file.name} → ${versionString(v)}`;
                refFileStatus.style.color = '#155724';
            } catch (err) {
                refFileStatus.textContent = `解析失败: ${err.message}`;
                refFileStatus.style.color = '#721c24';
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // --- File queue management ---
    function updateFileDisplay() {
        if (fileQueue.length > 0) {
            fileNameDisplay.innerHTML = `已选择 <b>${fileQueue.length}</b> 个文件`;
            processBtn.disabled = false;
        } else {
            fileNameDisplay.textContent = '（未选择文件）';
            processBtn.disabled = true;
        }
    }

    function showFileVersions(files) {
        fileVersionList.innerHTML = '';
        const readers = Array.from(files).map(file => {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = parseReplayHeader(e.target.result);
                        resolve({ name: file.name, version: versionString(parsed.version) });
                    } catch {
                        resolve({ name: file.name, version: '(解析失败)' });
                    }
                };
                reader.onerror = () => resolve({ name: file.name, version: '(读取失败)' });
                reader.readAsArrayBuffer(file);
            });
        });
        Promise.all(readers).then(results => {
            fileVersionList.innerHTML = results.map(r =>
                `<div><b>${r.name}</b> — 当前版本: ${r.version}</div>`
            ).join('');
        });
    }

    function addFilesToQueue(files) {
        const validFiles = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.sc2replay'));
        if (validFiles.length > 0) {
            fileQueue = validFiles;
            updateFileDisplay();
            showFileVersions(validFiles);
            statusDiv.textContent = '';
            statusDiv.style.backgroundColor = 'transparent';
        } else if (files.length > 0) {
            statusDiv.innerHTML = '未检测到有效的 .SC2Replay 文件。';
            statusDiv.style.backgroundColor = '#f8d7da';
            statusDiv.style.color = '#721c24';
        }
    }

    // --- Processing ---
    function processSingleFile(file, targetVersion) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = parseReplayHeader(e.target.result);
                    const oldVer = versionString(parsed.version);
                    const newBuffer = patchReplayVersion(e.target.result, targetVersion);

                    const blob = new Blob([newBuffer], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const baseName = file.name.replace(/\.SC2Replay$/i, '');
                    const newFileName = `${baseName}-PATCHED.SC2Replay`;
                    a.download = newFileName;
                    a.click();
                    URL.revokeObjectURL(url);

                    const targetStr = `${targetVersion.major}.${targetVersion.minor}.${targetVersion.revision}.${targetVersion.build}`;
                    resolve({ success: true, name: newFileName, message: `${oldVer} → ${targetStr}` });
                } catch (err) {
                    resolve({ success: false, name: file.name, message: err.message });
                }
            };
            reader.onerror = () => resolve({ success: false, name: file.name, message: '文件读取失败' });
            reader.readAsArrayBuffer(file);
        });
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function processFileQueue() {
        if (processing || fileQueue.length === 0) return;
        processing = true;
        processBtn.disabled = true;

        const targetVersion = getTargetVersion();
        const currentQueue = [...fileQueue];
        fileQueue = [];

        statusDiv.style.backgroundColor = '#fff3cd';
        statusDiv.style.color = '#856404';
        statusDiv.innerHTML = `<h4>正在处理...</h4><ul id="resultList" style="list-style-type:none;padding:0;"></ul>`;
        const resultList = document.getElementById('resultList');

        let successCount = 0, failCount = 0;
        for (let i = 0; i < currentQueue.length; i++) {
            const result = await processSingleFile(currentQueue[i], targetVersion);
            const icon = result.success ? '🟢' : '🔴';
            const li = document.createElement('li');
            li.style.cssText = (result.success ? 'color:#155724;' : 'color:#721c24;') + 'margin-bottom:4px;';
            li.innerHTML = `${icon} <b>${result.name}</b> — ${result.message}`;
            resultList.appendChild(li);
            if (result.success) successCount++; else failCount++;
            if (i < currentQueue.length - 1) await sleep(300);
        }

        processing = false;
        statusDiv.style.backgroundColor = '#e0ffe0';
        statusDiv.style.color = '#155724';
        const header = `<h4>处理完成: 成功 ${successCount}, 失败 ${failCount}</h4>`;
        statusDiv.innerHTML = header + `<ul style="list-style-type:none;padding:0;">${resultList.innerHTML}</ul>`;
        updateFileDisplay();
        fileVersionList.innerHTML = '';
    }

    // --- Event listeners ---
    fileInput.addEventListener('change', (e) => { fileQueue = []; addFilesToQueue(e.target.files); });

    dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) { fileQueue = []; addFilesToQueue(e.dataTransfer.files); }
    });

    processBtn.addEventListener('click', processFileQueue);
});
</script>

</body>
</html>
